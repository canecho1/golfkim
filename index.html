function onAdminSearch(){
  adminQuery = (document.getElementById('admin-search').value||'').trim();
  document.getElementById('search-clear').style.display = adminQuery ? 'block' : 'none';
  renderSearch();
}
function clearAdminSearch(){
  adminQuery = '';
  const inp = document.getElementById('admin-search'); if(inp) inp.value='';
  document.getElementById('search-clear').style.display = 'none';
  renderSearch();
}
function gradeLabel(phone){
  if(isPaidMember(phone)){ const m=members[phoneKey(phone)]; return `⭐ ${PLANS[m.plan]?PLANS[m.plan].label:'유료'} 회원`; }
  if(isFreeMember(phone)) return '🟢 무료회원';
  return '비회원';
}

// 비서 진행 내역 상세 보기
function showProDetail(name){
  const main = document.getElementById('admin-main');
  const out = document.getElementById('search-result');
  if(!main || !out) return;
  main.style.display = 'none';
  // 검색창 비우기(상세와 검색 충돌 방지)
  adminQuery=''; const inp=document.getElementById('admin-search'); if(inp) inp.value='';
  const sc=document.getElementById('search-clear'); if(sc) sc.style.display='none';

  const mine = requests.filter(r=>r.assigned===name);
  const total = mine.length;
  const ok = mine.filter(r=>r.status==='success').length;
  const ng = mine.filter(r=>r.status==='fail').length;
  const prog = mine.filter(r=>r.status==='received'||r.status==='forwarded').length;
  const rate = (ok+ng)>0 ? Math.round(ok/(ok+ng)*100) : 0;
  // 성사된 부킹 그린피 합계
  const revenue = mine.filter(r=>r.status==='success'&&r.booking&&r.booking.fee)
    .reduce((sum,r)=>sum+Number(r.booking.fee||0),0);

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:11px">
        <div class="sec-av" style="width:44px;height:44px;font-size:18px">${name[0]}</div>
        <div><div style="font-size:18px;font-weight:800">${escapeHtml(name)}</div><div style="font-size:12.5px;color:var(--text-dim)">진행 내역 전체</div></div>
      </div>
      <button class="mini-btn" onclick="closeProDetail()">✕ 닫기</button>
    </div>
    <div class="cust-profile">
      <div class="cp-stats">
        <div class="cp-stat"><div class="n">${total}</div><div class="l">맡은 요청</div></div>
        <div class="cp-stat"><div class="n">${prog}</div><div class="l">진행 중</div></div>
        <div class="cp-stat"><div class="n" style="color:var(--fairway-light)">${ok}</div><div class="l">성공</div></div>
        <div class="cp-stat"><div class="n">${rate}%</div><div class="l">성공률</div></div>
      </div>
      ${revenue>0?`<div class="pn-saved" style="margin-top:12px">💰 성사된 부킹 그린피 합계 <b>${revenue.toLocaleString()}원</b></div>`:''}
    </div>`;

  if(!mine.length){
    html += `<div class="empty">아직 이 비서에게 전달된 요청이 없습니다.</div>`;
  } else {
    // 전담 회원(손님) 목록 — 전화번호 기준으로 묶기
    const byPhone = {};
    mine.forEach(r=>{ const k=phoneKey(r.phone); (byPhone[k]=byPhone[k]||[]).push(r); });
    const phones = Object.keys(byPhone);
    html += `<div class="search-section-title">👤 전담 회원 (${phones.length}명)</div>`;
    html += phones.map(k=>{
      const list = byPhone[k]; const r0 = list[0];
      const won = list.filter(x=>x.status==='success').length;
      const note = customerNotes[k];
      return `<div class="sec" style="border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px">
        <div class="sec-av">${(r0.name||'?')[0]}</div>
        <div class="sec-info">
          <div class="sec-name">${escapeHtml(r0.name)} ${memberBadge(r0.phone)}${(note&&note.flagged)?' 🚩':''}</div>
          <div class="sec-meta">${r0.phone} · 요청 ${list.length}건 · 성공 ${won}건</div>
        </div>
        <a class="mini-btn call" href="tel:${r0.phone.replace(/-/g,'')}">📞</a>
      </div>`;
    }).join('');

    html += `<div class="search-section-title">📋 진행 요청 (${mine.length})</div>`;
    html += mine.map(r=>renderRequestCard(r)).join('');
  }
  html += `<button class="btn btn-ghost" style="width:100%;margin-top:18px" onclick="closeProDetail()">← 운영자 대시보드로 돌아가기</button>`;
  out.innerHTML = html;
  window.scrollTo({top:0, behavior:'smooth'});
}
function closeProDetail(){
  const main = document.getElementById('admin-main');
  const out = document.getElementById('search-result');
  if(out) out.innerHTML='';
  if(main) main.style.display='';
}
function renderSearch(){
  const main = document.getElementById('admin-main');
  const out = document.getElementById('search-result');
  if(!adminQuery){ out.innerHTML=''; main.style.display=''; return; }
  main.style.display = 'none';

  const q = adminQuery.toLowerCase();
  const qDigits = adminQuery.replace(/[^0-9]/g,'');
  // 요청 매칭: 이름·전화·골프장·담당비서
  const hits = requests.filter(r=>{
    const inName = r.name && r.name.toLowerCase().includes(q);
    const inPhone = qDigits && phoneKey(r.phone).includes(qDigits);
    const inCourse = r.booking && r.booking.course && r.booking.course.toLowerCase().includes(q);
    const inAssign = r.assigned && r.assigned.toLowerCase().includes(q);
    return inName || inPhone || inCourse || inAssign;
  });

  // 손님(전화번호)별로 묶어 프로필 카드 만들기
  const byPhone = {};
  hits.forEach(r=>{ const k=phoneKey(r.phone); (byPhone[k]=byPhone[k]||[]).push(r); });

  let html = '';
  // 손님 프로필 (이름/전화 매칭 시)
  Object.keys(byPhone).forEach(k=>{
    const list = byPhone[k];
    const r0 = list[0];
    const ok = list.filter(x=>x.status==='success').length;
    const yUsed = successThisYear(r0.phone);
    const mUsed = successThisMonth(r0.phone);
    const note = customerNotes[k];
    html += `<div class="cust-profile">
      <div class="cp-head">
        <div><div class="cp-name">${escapeHtml(r0.name)} ${memberBadge(r0.phone)}</div><div class="cp-phone">${r0.phone} · ${gradeLabel(r0.phone)}</div></div>
        <a class="mini-btn call" href="tel:${r0.phone.replace(/-/g,'')}">📞 전화</a>
      </div>
      <div class="cp-stats">
        <div class="cp-stat"><div class="n">${list.length}</div><div class="l">전체 요청</div></div>
        <div class="cp-stat"><div class="n" style="color:var(--fairway-light)">${ok}</div><div class="l">예약 성공</div></div>
        <div class="cp-stat"><div class="n">${mUsed}</div><div class="l">이번 달 이용</div></div>
        <div class="cp-stat"><div class="n">${yUsed}</div><div class="l">올해 이용</div></div>
      </div>
      ${(note&&note.text)?`<div class="saved-note" style="margin-top:12px">📝 ${escapeHtml(note.text)}${note.flagged?' 🚩':''}<div class="sn-by">— ${note.by||'비서'} · ${fmtTime(note.at)}</div></div>`:''}
    </div>`;
  });

  // 비서 매칭
  const secHits = secretaries.filter(s=>s.name.toLowerCase().includes(q));
  if(secHits.length){
    html += `<div class="search-section-title">👥 비서 (${secHits.length})</div>`;
    html += secHits.map(s=>{
      const handled = requests.filter(r=>r.assigned===s.name && (r.status==='success'||r.status==='fail')).length;
      const won = requests.filter(r=>r.assigned===s.name && r.status==='success').length;
      return `<div class="sec" style="border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px">
        <div class="sec-av">${s.name[0]}</div>
        <div class="sec-info"><div class="sec-name">${s.name} ${s.owner?'<span style="font-size:11px;color:var(--gold)">★ 운영자</span>':''}</div>
          <div class="sec-meta">전달 ${s.count}건 · 성공 ${won}건 / 처리 ${handled}건</div></div>
      </div>`;
    }).join('');
  }

  // 매칭된 요청 목록
  if(hits.length){
    html += `<div class="search-section-title">📩 관련 요청 (${hits.length})</div>`;
    html += hits.map(r=>renderRequestCard(r)).join('');
  }

  if(!html) html = `<div class="empty">"${escapeHtml(adminQuery)}"에 대한 결과가 없습니다.</div>`;
  out.innerHTML = html;
}

const STATUS_LABEL = {
  received: {t:'접수', c:'st-received'},
  forwarded: {t:'전달됨', c:'st-forwarded'},
  success: {t:'예약 성공', c:'st-success'},
  fail: {t:'예약 실패', c:'st-fail'},
};
function fmtTime(ts){
  if(!ts) return '-';
  const d = new Date(ts);
  const p = n=>String(n).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// 운영자 요청 카드 1개 렌더 (대시보드 목록·검색결과 공용)
let editingId = null;
function startEdit(id){ editingId = id; renderAdmin(); }
function cancelEdit(){ editingId = null; renderAdmin(); }
function saveEdit(id){
  const r = requests.find(x=>x.id===id);
  if(!r) return;
  const g = s => { const el=document.getElementById(s); return el?el.value.trim():null; };
  const name = g('edit-name-'+id), phone = g('edit-phone-'+id), inq = g('edit-inq-'+id);
  if(name!==null && name) r.name = name;
  if(phone!==null && phone) r.phone = phone;
  if(inq!==null) r.inquiry = inq;
  editingId = null;
  persist();
  showToast('✏️ 요청을 수정했어요.');
  renderAdmin();
}
function deleteRequest(id){
  const r = requests.find(x=>x.id===id);
  if(!r) return;
  if(!confirm(`${r.name} 님의 요청을 삭제할까요?\n삭제하면 되돌릴 수 없습니다.`)) return;
  requests = requests.filter(x=>x.id!==id);
  if(editingId===id) editingId = null;
  persist();
  showToast('🗑 요청을 삭제했어요.');
  renderAdmin();
}
// 운영자 진행 메모 저장 (투어·회원권 등 운영자 처리 건)
function saveAdminNote(id){
  const r = requests.find(x=>x.id===id);
  if(!r) return;
  const ta = document.getElementById('pn-'+id);
  if(!ta) return;
  r.adminNote = ta.value.trim();
  r.adminNoteAt = Date.now();
  persist();
  showToast('🗒️ 진행 메모를 저장했어요.');
  renderAdmin();
}
function renderRequestCard(r){
  const opts = secretaries.map(s=>`<option value="${s.name}" ${r.assigned===s.name?'selected':''}>${s.name}</option>`).join('');
  const st = STATUS_LABEL[r.status] || STATUS_LABEL.received;
  let actionArea;
  if(r.status==='success' || r.status==='fail'){
    actionArea = `<span class="assigned-to">${r.adminOnly?'운영자 처리':'담당: '+(r.assigned||'-')}</span>
      <a class="mini-btn call" href="tel:${r.phone.replace(/-/g,'')}">📞 전화</a>`;
  } else if(r.adminOnly){
    // 상담(국내·해외·회원권): 비서 전달 없이 운영자가 직접 처리
    actionArea = `<a class="mini-btn call" href="tel:${r.phone.replace(/-/g,'')}">📞 전화</a>
      <button class="mini-btn success" onclick="setResult(${r.id},'success')">✅ 상담 완료</button>
      <button class="mini-btn fail" onclick="setResult(${r.id},'fail')">❌ 보류/취소</button>`;
  } else if(r.forwarded){
    actionArea = `<span class="assigned-to">✓ ${r.assigned}에게 전달됨</span>
      <a class="mini-btn call" href="tel:${r.phone.replace(/-/g,'')}">📞 전화</a>`;
  } else {
    actionArea = `<select class="assign-select" onchange="setAssignee(${r.id}, this.value)">
        <option value="">담당 프로 선택…</option>${opts}
      </select>
      <button class="mini-btn forward" onclick="forwardRequest(${r.id})" ${r.assigned?'':'disabled'}>➡️ 전달하기</button>
      <a class="mini-btn call" href="tel:${r.phone.replace(/-/g,'')}">📞 전화</a>`;
  }
  let meta = `접수 <b>${fmtTime(r.createdAt)}</b>`;
  if(r.forwardedAt) meta += ` · ${r.assigned}에게 전달 <b>${fmtTime(r.forwardedAt)}</b>`;
  if(r.closedAt) meta += ` · ${r.status==='success'?'성공':'실패'} 처리 <b>${fmtTime(r.closedAt)}</b>`;

  const note = customerNotes[phoneKey(r.phone)];
  const warn = (note && note.flagged)
    ? `<div class="warn-banner">🚩 주의 손님 — 비서가 표시한 손님이에요.</div>` : '';
  const savedNote = (note && note.text)
    ? `<div class="saved-note" style="margin-top:9px">📝 ${escapeHtml(note.text)}<div class="sn-by">— ${note.by||'비서'} · ${fmtTime(note.at)}</div></div>` : '';

  const bk = r.booking || {};
  const bookedInfo = (r.status==='success' && (bk.course||bk.bdate||bk.fee))
    ? `<div class="booked-info">
         <div class="bi-title">✅ 성사된 부킹 — 담당 ${r.assigned||'-'}</div>
         <div>골프장 <b>${escapeHtml(bk.course||'-')}</b> · 일시 <b>${escapeHtml(bk.bdate||'-')} ${escapeHtml(bk.btime||'')}</b></div>
         <div>그린피 <b>${bk.fee?Number(bk.fee).toLocaleString()+'원':'-'}</b></div>
       </div>` : '';

  const cat = CATEGORIES[r.category] || CATEGORIES.golf;
  const isGolf = !r.category || r.category==='golf';
  const detailArea = isGolf
    ? `<div class="req-detail">
        <span class="chip">📅 <b>${r.date}</b></span>
        <span class="chip">⏰ <b>${r.time}</b></span>
        <span class="chip">📍 <b>${r.region}</b></span>
        <span class="chip">🚗 <b>${r.origin} 출발</b></span>
        <span class="chip">${r.priority==='vip'?'🤝 접대':'💰 가성비'}</span>
      </div>`
    : `<div class="req-detail"><span class="chip">${cat.emoji} <b>${cat.name}</b></span>${r.category==='membership'?`<span class="chip">${r.dealType==='sell'?'📤 매도':'📥 매수'}</span><span class="chip">📍 <b>${r.memRegion||'-'}</b></span>`:''}${(r.category==='overnight'||r.category==='overseas')?`${r.tourDate?`<span class="chip">📅 <b>${r.tourDate}</b></span>`:''}${r.tourPeople?`<span class="chip">👥 <b>${r.tourPeople}</b></span>`:''}${r.memRegion?`<span class="chip">${r.category==='overseas'?'🌏':'📍'} <b>${r.memRegion}</b></span>`:''}`:''}</div>
       <div class="saved-note" style="margin-top:9px">${escapeHtml(r.inquiry||'')}</div>`;

  // 수정/삭제 도구 (편집 중이면 폼, 아니면 버튼)
  let toolsArea;
  if(editingId === r.id){
    const isGolfReq = !r.category || r.category==='golf';
    toolsArea = `<div class="edit-box">
      <div class="eb-title">✏️ 요청 수정</div>
      <label>성함</label>
      <input id="edit-name-${r.id}" value="${escapeHtml(r.name)}">
      <label>연락처</label>
      <input id="edit-phone-${r.id}" value="${escapeHtml(r.phone)}">
      ${isGolfReq ? '' : `<label>요청 내용</label><textarea id="edit-inq-${r.id}">${escapeHtml(r.inquiry||'')}</textarea>`}
      <div class="assign-row">
        <button class="mini-btn success" onclick="saveEdit(${r.id})">저장</button>
        <button class="mini-btn" onclick="cancelEdit()">취소</button>
      </div>
    </div>`;
  } else {
    toolsArea = `<div class="req-tools">
      <button class="mini-btn" onclick="startEdit(${r.id})">✏️ 수정</button>
      <button class="mini-btn del" onclick="deleteRequest(${r.id})">🗑 삭제</button>
    </div>`;
  }

  // 운영자 진행 메모 (투어·회원권 등 운영자 처리 건)
  const progressNote = r.adminOnly ? `
    <div class="progress-note">
      <div class="pn-label">🗒️ 운영자 진행 메모</div>
      ${r.adminNote ? `<div class="pn-saved">${escapeHtml(r.adminNote)}<div class="pn-by">최종 수정 ${fmtTime(r.adminNoteAt)}</div></div>` : ''}
      <div class="pn-area">
        <textarea id="pn-${r.id}" placeholder="예: 다낭 OO클럽 견적 요청·전달 완료 / 회원권 매물 3건 안내함…">${escapeHtml(r.adminNote||'')}</textarea>
        <button class="pn-save" onclick="saveAdminNote(${r.id})">저장</button>
      </div>
    </div>` : '';

  return `<div class="req ${r.isNew?'fresh':''}">
    ${warn}
    <div class="req-top">
      <div><div class="req-name">${escapeHtml(r.name)}${memberBadge(r.phone)}${r.isNew?'<span class="new-pill">NEW</span>':''}</div><div class="req-phone">${r.phone}</div></div>
      <span class="status ${st.c}">${st.t}</span>
    </div>
    ${detailArea}
    <div class="assign-row">${actionArea}</div>
    ${bookedInfo}
    ${progressNote}
    ${savedNote}
    <div class="req-meta">${meta}</div>
    ${toolsArea}
  </div>`;
}

// 운영자 대시보드 전체 렌더
function renderAdmin(){
  const total = requests.length;
  const inprog = requests.filter(r=>r.status==='received'||r.status==='forwarded').length;
  const ok = requests.filter(r=>r.status==='success').length;
  const ng = requests.filter(r=>r.status==='fail').length;
  const rate = (ok+ng)>0 ? Math.round(ok/(ok+ng)*100) : 0;
  const now = Date.now();
  const activeMembers = Object.values(members).filter(m=>m && m.expiresAt && m.expiresAt > now);
  const memberCount = activeMembers.length;
  // 이번 달 매출: 이번 달에 결제(가입/갱신)된 건들의 플랜 금액 합
  const ym = curMonthKey();
  const revenueNum = Object.values(members).reduce((sum,m)=>{
    if(!m || !m.since) return sum;
    const d = new Date(m.since);
    const mKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(mKey !== ym) return sum;
    return sum + (PLANS[m.plan] ? PLANS[m.plan].price : 0);
  }, 0);
  const revenue = revenueNum.toLocaleString();
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lab">전체 요청</div></div>
    <div class="stat"><div class="num" style="color:var(--fairway-light)">${ok}</div><div class="lab">예약 성공</div></div>
    <div class="stat"><div class="num" style="color:var(--gold)">${memberCount}</div><div class="lab">현재 유료 멤버</div></div>
    <div class="stat"><div class="num">${revenue}<small style="font-size:13px;color:var(--text-dim)">원</small></div><div class="lab">이번 달 멤버십 매출</div></div>`;

  // 필터 칩
  const counts = {
    all: total,
    received: requests.filter(r=>r.status==='received').length,
    forwarded: requests.filter(r=>r.status==='forwarded').length,
    success: ok, fail: ng,
  };
  const chips = [
    ['all','전체'],['received','접수'],['forwarded','전달됨'],['success','예약 성공'],['fail','예약 실패']
  ].map(([k,t])=>`<button class="filter-chip ${adminFilter===k?'on':''}" onclick="setFilter('${k}')">${t} ${counts[k]}</button>`).join('');

  const rl = document.getElementById('req-list');
  const list = requests.filter(r=> adminFilter==='all' ? true : r.status===adminFilter);

  let body;
  if(!requests.length){ body = `<div class="empty">아직 요청이 없습니다.<br>'예약 신청' 탭에서 테스트해 보세요.</div>`; }
  else if(!list.length){ body = `<div class="empty">해당 상태의 요청이 없습니다.</div>`; }
  else {
    body = list.map(r=>renderRequestCard(r)).join('');
  }
  rl.innerHTML = `<div class="filter-row">${chips}</div>` + body;

  // secretaries (성공/처리 건수 포함)
  const sl = document.getElementById('sec-list');
  sl.innerHTML = secretaries.map((s,i)=>{
    const mineReqs = requests.filter(r=>r.assigned===s.name);
    const handled = mineReqs.filter(r=>r.status==='success'||r.status==='fail').length;
    const won = mineReqs.filter(r=>r.status==='success').length;
    const allCnt = new Set(mineReqs.map(r=>phoneKey(r.phone))).size;  // 응대한 전체 회원 수
    const memberCnt = new Set(
      mineReqs.filter(r=>isPaidMember(r.phone)).map(r=>phoneKey(r.phone))
    ).size;  // 담당 유료회원 수(전화번호 기준)
    return `<div class="sec">
      <div class="sec-av" onclick="showProDetail('${escapeHtml(s.name)}')" style="cursor:pointer">${s.name[0]}</div>
      <div class="sec-info" onclick="showProDetail('${escapeHtml(s.name)}')" style="cursor:pointer">
        <div class="sec-name">${s.name} ${s.owner?'<span style="font-size:11px;color:var(--gold)">★ 운영자</span>':''}</div>
        <div class="sec-meta">회원 ${allCnt}명 (유료 ${memberCnt}명) · 전달 ${s.count}건 · 성공 ${won}건 / 처리 ${handled}건</div>
      </div>
      <button class="mini-btn" onclick="showProDetail('${escapeHtml(s.name)}')">내역</button>
      ${s.owner?'':`<button class="mini-btn" onclick="removeSec(${i})" style="margin-left:6px">삭제</button>`}
    </div>`;
  }).join('');

  if(requests.some(r=>r.isNew)){
    setTimeout(()=>{ requests.forEach(r=>r.isNew=false); }, 2500);
  }
  // 검색 중이면 결과도 갱신
  if(adminQuery && document.getElementById('search-result')) renderSearch();
}

function setAssignee(id, name){
  const r = requests.find(x=>x.id===id);
  if(r){ r.assigned = name || null; persist(); renderAdmin(); }
}
function forwardRequest(id){
  const r = requests.find(x=>x.id===id);
  if(!r || !r.assigned) return;
  const s = secretaries.find(x=>x.name===r.assigned);
  if(!s) return;
  r.forwarded = true;
  r.forwardedNew = true;
  r.status = 'forwarded';
  r.forwardedAt = Date.now();
  s.count++;
  s.unseen = (s.unseen||0) + 1;
  updateProBadge();
  persist();
  showToast(`➡️ ${r.assigned}에게 전달했어요!`);
  renderAdmin();
}
function setResult(id, result){
  const r = requests.find(x=>x.id===id);
  if(!r) return;
  r.status = result;            // 'success' | 'fail'
  r.closedAt = Date.now();
  persist();
  showToast(result==='success' ? '✅ 예약 성공으로 기록했어요!' : '❌ 예약 실패로 기록했어요.');
  renderPro();
  renderAdmin();
}

// 부킹 시간 자동 변환: "0712"·"712" → "07:12"
function formatTimeField(id){
  const el = document.getElementById('bk-time-'+id);
  if(!el) return;
  let digits = el.value.replace(/[^0-9]/g,'');
  if(digits.length===3) digits = '0' + digits;   // 712 → 0712
  if(digits.length===4){
    el.value = digits.slice(0,2) + ':' + digits.slice(2);
  }
  onBookingInput(id);
}

// 그린피 자동 변환: "180000" → "180,000원"
function formatFeeField(id){
  const el = document.getElementById('bk-fee-'+id);
  if(!el) return;
  const digits = el.value.replace(/[^0-9]/g,'');
  el.value = digits ? Number(digits).toLocaleString() + '원' : '';
  onBookingInput(id);
}

// 부킹 내역 입력 → r.booking에 임시 저장하면서 성공 버튼 활성화 제어
function onBookingInput(id){
  const r = requests.find(x=>x.id===id);
  if(!r) return;
  const g = s => { const el=document.getElementById(s+id); return el?el.value.trim():''; };
  r.booking = {
    course: g('bk-course-'),
    bdate:  g('bk-date-'),
    btime:  g('bk-time-'),
    fee:    g('bk-fee-').replace(/[^0-9]/g,''),
  };
  const ok = r.booking.course && r.booking.bdate && r.booking.btime && r.booking.fee;
  const btn = document.getElementById('ok-btn-'+id);
  if(btn) btn.style.opacity = ok ? '1' : '0.45';
}
// 예약 성공 확정 (내역 필수 검증)
function confirmSuccess(id){
  const r = requests.find(x=>x.id===id);
  if(!r) return;
  // 최신 입력값 반영
  onBookingInput(id);
  const b = r.booking || {};
  if(!(b.course && b.bdate && b.btime && b.fee)){
    showToast('골프장명·날짜·시간·그린피를 모두 입력해 주세요.');
    return;
  }
  setResult(id, 'success');
}

/* 손님 메모 저장 (전화번호 기준 공유) */
function saveNote(phone, savedBy){
  const key = phoneKey(phone);
  const ta = document.getElementById('note-'+key);
  if(!ta) return;
  const text = ta.value.trim();
  const prev = customerNotes[key] || {};
  customerNotes[key] = {
    text,
    flagged: prev.flagged || false,
    by: savedBy,
    at: Date.now(),
  };
  persist();
  showToast('📝 손님 메모를 저장했어요. (모든 비서에게 공유)');
  renderPro(); renderAdmin();
}
function toggleFlag(phone, savedBy){
  const key = phoneKey(phone);
  const prev = customerNotes[key] || { text:'' };
  prev.flagged = !prev.flagged;
  prev.by = savedBy; prev.at = Date.now();
  customerNotes[key] = prev;
  persist();
  showToast(prev.flagged ? '🚩 주의 손님으로 표시했어요.' : '표시를 해제했어요.');
  renderPro(); renderAdmin();
}

}

(function(){

(function(){
  let startX=0, startY=0, startT=0, tracking=false;
  const EDGE_GUARD = 0;     // 화면 어디서 시작해도 허용
  document.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) { tracking=false; return; }
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; startT = Date.now();
    tracking = true;
  }, { passive:true });
  document.addEventListener('touchend', e=>{
    if(!tracking) return; tracking=false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    // 오른쪽으로 충분히 크게, 가로가 세로보다 확실히 크고, 너무 느리지 않게
    const farEnough = dx > 90;
    const horizontal = Math.abs(dx) > Math.abs(dy) * 2.5;
    const notTooVertical = Math.abs(dy) < 60;
    const quickEnough = dt < 700;
    if(farEnough && horizontal && notTooVertical && quickEnough){
      // 입력 요소를 가로로 드래그한 경우 제외(텍스트 선택 등)
      const tag = (e.target && e.target.tagName) || '';
      if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
      swipeBack();
    }
  }, { passive:true });
})();

<script>

  // 2) 서비스워커 등록 → 오프라인 지원 + 항상 최신본 우선(네트워크 우선)
  //    (file:// 로 직접 열면 동작하지 않음. https 또는 localhost에서 동작)
  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
    var swCode = [
      // 버전(kimbiseo-vN)을 올리면 새 워커로 인식되어 즉시 교체됨
      "const CACHE='kimbiseo-v2';",
      "self.addEventListener('install', e=>{ self.skipWaiting(); });",
      "self.addEventListener('activate', e=>{ e.waitUntil((async()=>{",
      "  const keys = await caches.keys();",
      "  await Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)));", // 옛 캐시 삭제
      "  await self.clients.claim();",
      "})()); });",
      "self.addEventListener('fetch', e=>{",
      "  if(e.request.method!=='GET') return;",
      "  e.respondWith((async()=>{",
      "    try{",
      "      const net = await fetch(e.request, {cache:'no-store'});", // 항상 서버에서 최신 시도
      "      const c = await caches.open(CACHE); c.put(e.request, net.clone()); return net;",
      "    }catch(_){",
      "      const hit = await caches.match(e.request); if(hit) return hit;",
      "      const home = await caches.match(location.origin+location.pathname); if(home) return home;",
      "      return new Response('오프라인 상태예요. 인터넷에 연결되면 자동으로 최신 화면을 불러옵니다.', {headers:{'Content-Type':'text/plain; charset=utf-8'}});",
      "    }",
      "  })());",
      "});"
    ].join("\n");
    try {
      var swUrl = URL.createObjectURL(new Blob([swCode], { type:'text/javascript' }));
      navigator.serviceWorker.register(swUrl).then(function(reg){
        // 새 버전이 감지되면 설치 완료 후 한 번 자동 새로고침
        reg.addEventListener('updatefound', function(){
          var nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state==='activated' && navigator.serviceWorker.controller){
              // 이미 제어 중이던 페이지라면 최신본으로 갱신
              if(!window.__reloadedForSW){ window.__reloadedForSW=true; location.reload(); }
            }
          });
        });
        // 페이지 열 때 업데이트 확인
        reg.update();
      }).catch(function(){ /* 등록 실패 무시 */ });
    } catch(e) { /* SW 등록 불가 시 무시 */ }
  }
})();
