<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root {
    --bg: #0d1f17;
    --bg-soft: #122c20;
    --card: #16352735;
    --fairway: #2e7d4f;
    --fairway-light: #4caf72;
    --flag: #e8553a;
    --gold: #c9a857;
    --cream: #f4f1e8;
    --text: #eef3ee;
    --text-dim: #9bb3a3;
    --line: #2a4a38;
    --shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-x: hidden; }
  body { overflow-x: hidden; overflow-y: auto; overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; }
  body { padding-top: var(--topbar-h, 80px); }
  body {
    font-family: 'Pretendard', sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(76,175,114,0.12), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,168,87,0.08), transparent 45%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    max-width: 100vw;
    position: relative;
  }
  .serif { font-family: 'Gowun Batang', serif; }

  /* ===== Top bar (화면 상단 고정) ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px;
    padding-top: calc(18px + env(safe-area-inset-top));
    border-bottom: 1px solid var(--line);
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(13,31,23,0.92);
    backdrop-filter: blur(12px);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(135deg, var(--fairway-light), var(--fairway));
    display: grid; place-items: center;
    font-size: 20px;
    box-shadow: 0 6px 16px -6px rgba(76,175,114,0.6);
  }
  .brand-name { font-weight: 800; font-size: 18px; letter-spacing: -0.4px; }
  .brand-name small { display:block; font-size: 10.5px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.5px; }
  .tabs { display: flex; gap: 4px; background: var(--bg-soft); padding: 4px; border-radius: 12px; }
  .tab {
    border: none; background: none; color: var(--text-dim);
    font-family: inherit; font-weight: 600; font-size: 13px;
    padding: 8px 16px; border-radius: 9px; cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--fairway); color: #fff; }

  /* ===== Layout ===== */
  .wrap { max-width: 560px; margin: 0 auto; padding: 28px 20px 80px; }
  .wrap.wide { max-width: 920px; }

  /* ===== Progress ===== */
  .progress { display: flex; gap: 6px; margin-bottom: 30px; }
  .progress span {
    flex: 1; height: 4px; border-radius: 4px; background: var(--line);
    transition: background 0.4s;
  }
  .progress span.done { background: var(--fairway-light); }

  .step-tag { font-size: 12.5px; color: var(--gold); font-weight: 700; letter-spacing: 1.5px; margin-bottom: 10px; }
  .step-title { font-size: 27px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 6px; }
  .step-sub { color: var(--text-dim); font-size: 14.5px; margin-bottom: 28px; }

  /* ===== Options ===== */
  .opt-grid { display: grid; gap: 11px; }
  .opt-grid.cols2 { grid-template-columns: 1fr 1fr; }
  .opt-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt {
    border: 1.5px solid var(--line); background: var(--card);
    border-radius: 15px; padding: 17px 18px; cursor: pointer;
    transition: all 0.18s; text-align: left; font-family: inherit;
    color: var(--text); display: flex; flex-direction: column; gap: 3px;
  }
  .opt:hover { border-color: var(--fairway-light); transform: translateY(-2px); }
  .opt.sel { border-color: var(--fairway-light); background: rgba(76,175,114,0.14); box-shadow: 0 0 0 3px rgba(76,175,114,0.15); }
  .opt .o-main { font-weight: 700; font-size: 15.5px; }
  .opt .o-desc { font-size: 12.5px; color: var(--text-dim); }
  .opt .o-emoji { font-size: 22px; margin-bottom: 4px; }

  /* ===== Calendar ===== */
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cal-head button { background: var(--bg-soft); border: 1px solid var(--line); color: var(--text); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 16px; }
  .cal-month { font-weight: 700; font-size: 16px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { text-align: center; font-size: 12px; color: var(--text-dim); padding: 6px 0; font-weight: 600; }
  .cal-day {
    aspect-ratio: 1; border: none; background: none; color: var(--text);
    border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 14px;
    font-weight: 500; transition: all 0.15s;
  }
  .cal-day:hover:not(:disabled) { background: var(--bg-soft); }
  .cal-day:disabled { color: #3a5547; cursor: default; }
  .cal-day.sel { background: var(--fairway); color: #fff; font-weight: 700; }
  .cal-day.range { background: rgba(76,175,114,0.22); color: var(--text); border-radius: 0; }
  .cal-day.sun, .cal-day.holiday { color: var(--flag); }
  .cal-day.sun:disabled, .cal-day.holiday:disabled { color: #6b3a32; }
  .cal-day.sat { color: #6ea8ff; }
  .cal-day.sat:disabled { color: #3f5a7a; }
  .cal-day.sel, .cal-day.sel.sun, .cal-day.sel.sat, .cal-day.sel.holiday { background: var(--fairway); color: #fff; font-weight: 700; }

  /* ===== Inputs ===== */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }
  .field input {
    width: 100%; padding: 15px 16px; border-radius: 13px;
    border: 1.5px solid var(--line); background: var(--card);
    color: var(--text); font-family: inherit; font-size: 15px;
  }
  .field input:focus { outline: none; border-color: var(--fairway-light); }
  .field input::placeholder { color: #5d7768; }

  /* ===== Buttons ===== */
  .nav-row { display: flex; gap: 10px; margin-top: 30px; }
  .btn {
    flex: 1; padding: 16px; border-radius: 14px; border: none;
    font-family: inherit; font-weight: 700; font-size: 15.5px; cursor: pointer;
    transition: all 0.18s;
    position: relative; z-index: 1; -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: linear-gradient(135deg, var(--fairway-light), var(--fairway)); color: #fff; box-shadow: 0 10px 24px -10px rgba(76,175,114,0.7); }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }
  .btn-ghost { flex: 0 0 auto; padding: 16px 22px; background: var(--bg-soft); color: var(--text-dim); border: 1px solid var(--line); }

  /* ===== Summary / confirm ===== */
  .summary-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; padding: 6px 4px; margin-bottom: 22px;
  }
  .sum-row { display: flex; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .sum-row:last-child { border-bottom: none; }
  .sum-row .k { color: var(--text-dim); font-size: 13.5px; }
  .sum-row .v { font-weight: 700; font-size: 14.5px; }

  /* ===== Done screen ===== */
  .done { text-align: center; padding-top: 30px; }
  .done-icon {
    width: 84px; height: 84px; margin: 0 auto 22px; border-radius: 50%;
    background: linear-gradient(135deg, var(--fairway-light), var(--fairway));
    display: grid; place-items: center; font-size: 40px;
    box-shadow: 0 16px 40px -12px rgba(76,175,114,0.7);
    animation: pop 0.5s cubic-bezier(.2,1.3,.5,1);
  }
  @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .kakao-preview {
    text-align: left; background: #fae100; color: #3c1e1e;
    border-radius: 16px; padding: 18px; margin: 26px 0 8px;
    font-size: 13.5px; position: relative;
  }
  .kakao-preview .kk-tag { font-weight: 800; font-size: 11px; letter-spacing: 1px; opacity: 0.6; margin-bottom: 8px; }
  .kakao-preview .kk-body { background: #fff; border-radius: 11px; padding: 14px; white-space: pre-line; line-height: 1.6; }

  .note { font-size: 12px; color: var(--text-dim); margin-top: 16px; line-height: 1.6; }

  /* ===== Admin ===== */

  .stat .num { font-size: 26px; font-weight: 800; }
  .stat .lab { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }

  .admin-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 20px; }

  .req {
    border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; margin-bottom: 11px;

  .req-phone { font-size: 12px; color: var(--text-dim); }
  .req-badge { font-size: 10.5px; font-weight: 700; padding: 4px 9px; border-radius: 20px; letter-spacing: 0.3px; }
  .badge-vip { background: rgba(232,85,58,0.18); color: #ff9580; }
  .badge-eco { background: rgba(76,175,114,0.18); color: var(--fairway-light); }
  .req-detail { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 11px; }
  .chip { font-size: 12px; background: var(--card); border: 1px solid var(--line); padding: 4px 10px; border-radius: 8px; color: var(--text-dim); }

  .mini-btn { font-family: inherit; font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 9px; border: 1px solid var(--line); background: var(--card); color: var(--text); cursor: pointer; }

  .mini-btn.call { background: var(--fairway); border-color: var(--fairway); color: #fff; }

  select.assign-select { font-family: inherit; font-size: 12px; padding: 7px 10px; border-radius: 9px; border: 1px solid var(--line); background: var(--bg-soft); color: var(--text); cursor: pointer; }
  select.assign-select option { background: #16352a; color: var(--text); }

  /* secretary list */
  .sec { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .sec:last-of-type { border-bottom: none; }
  .sec-av { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-soft); display: grid; place-items: center; font-weight: 700; font-size: 15px; color: var(--fairway-light); border: 1px solid var(--line); }
  .sec-info { flex: 1; }
  .sec-name { font-weight: 700; font-size: 14px; }
  .sec-meta { font-size: 11.5px; color: var(--text-dim); }
  .sec-count { font-size: 12px; font-weight: 700; background: var(--bg-soft); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--line); }
  .add-sec { display: flex; gap: 8px; margin-top: 14px; }
  .add-sec input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--bg-soft); color: var(--text); font-family: inherit; font-size: 13px; }
  .add-sec input:focus { outline: none; border-color: var(--fairway-light); }
  .add-sec button { padding: 10px 16px; border-radius: 10px; border: none; background: var(--fairway); color: #fff; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }

  .mode-toggle { display: flex; gap: 6px; background: var(--bg-soft); padding: 4px; border-radius: 10px; margin-bottom: 16px; }
  .mode-toggle button { flex:1; border: none; background: none; color: var(--text-dim); font-family: inherit; font-weight: 600; font-size: 12.5px; padding: 8px; border-radius: 7px; cursor: pointer; }

  .empty { text-align: center; color: var(--text-dim); padding: 30px 0; font-size: 13.5px; }

  /* 새 신청 알림 배지 (탭) */
  .tab-badge {
    display: inline-grid; place-items: center; min-width: 18px; height: 18px;
    padding: 0 5px; margin-left: 6px; border-radius: 20px;
    background: var(--flag); color: #fff; font-size: 11px; font-weight: 800;
    vertical-align: middle;
  }
  /* 토스트 */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: var(--fairway); color: #fff; font-weight: 700; font-size: 14px;
    padding: 13px 22px; border-radius: 13px; box-shadow: var(--shadow);
    opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* 새로 들어온 요청 강조 */
  .req.fresh { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,87,0.15); animation: flash 1.2s ease; }
  @keyframes flash { 0%{background:rgba(201,168,87,0.22)} 100%{background:var(--bg-soft)} }
  .new-pill { font-size: 10px; font-weight: 800; background: var(--gold); color: #2a1e00; padding: 3px 7px; border-radius: 6px; letter-spacing: 0.5px; margin-left: 7px; }
  .mini-btn.copy { background: var(--bg-soft); }
  .mini-btn.copy.done { background: var(--fairway); border-color: var(--fairway); color: #fff; }
  .mini-btn.forward { background: var(--gold); border-color: var(--gold); color: #2a1e00; }
  .mini-btn.forward:disabled { opacity: 0.4; cursor: default; background: var(--bg-soft); border-color: var(--line); color: var(--text-dim); }
  .mini-btn.success { background: var(--fairway); border-color: var(--fairway); color: #fff; }
  .mini-btn.fail { background: rgba(232,85,58,0.15); border-color: var(--flag); color: #ff9580; }

  /* 상태 뱃지 */
  .status { font-size: 10.5px; font-weight: 800; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px; white-space: nowrap; }
  .st-received { background: rgba(155,179,163,0.18); color: var(--text-dim); }
  .st-forwarded { background: rgba(201,168,87,0.18); color: var(--gold); }
  .st-success { background: rgba(76,175,114,0.2); color: var(--fairway-light); }
  .st-fail { background: rgba(232,85,58,0.18); color: #ff9580; }

  /* 필터 칩 */
  .filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip { font-family: inherit; font-size: 12.5px; font-weight: 600; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg-soft); color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
  .filter-chip.on { background: var(--fairway); border-color: var(--fairway); color: #fff; }

  .req-meta { font-size: 11px; color: var(--text-dim); margin-top: 9px; padding-top: 9px; border-top: 1px dashed var(--line); line-height: 1.7; }
  .req-meta b { color: var(--text); font-weight: 600; }

  /* 손님 메모 / 진상 플래그 */
  .cust-note-box { margin-top: 11px; padding-top: 11px; border-top: 1px dashed var(--line); }
  .cust-note-label { font-size: 11.5px; color: var(--text-dim); font-weight: 600; margin-bottom: 7px; display:flex; align-items:center; gap:6px; }
  .note-area { display: flex; gap: 7px; align-items: flex-start; }
  .note-area textarea {
    flex: 1; resize: vertical; min-height: 38px; font-family: inherit; font-size: 12.5px;
    padding: 9px 11px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg-soft); color: var(--text); line-height: 1.5;
  }
  .note-area textarea:focus { outline: none; border-color: var(--fairway-light); }
  .note-area textarea::placeholder { color: #5d7768; }
  .note-save { padding: 9px 13px; border-radius: 10px; border: none; background: var(--fairway); color:#fff; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }

  .flag-toggle {
    display:inline-flex; align-items:center; gap:5px; font-family:inherit; font-size:11.5px; font-weight:700;
    padding: 6px 11px; border-radius: 20px; cursor: pointer; border: 1px solid var(--line);
    background: var(--bg-soft); color: var(--text-dim); transition: all 0.15s;
  }
  .flag-toggle.on { background: rgba(232,85,58,0.18); border-color: var(--flag); color: #ff9580; }

  /* 진상 경고 배너 (카드 상단) */
  .warn-banner {
    display:flex; align-items:center; gap:7px; background: rgba(232,85,58,0.14);
    border: 1px solid rgba(232,85,58,0.4); color:#ff9580; border-radius: 11px;
    padding: 9px 12px; font-size: 12px; font-weight: 600; margin-bottom: 11px; line-height:1.5;
  }
  .saved-note { background: var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:9px 11px; font-size:12px; color:var(--text); line-height:1.55; margin-bottom:8px; white-space:pre-line; }
  .saved-note .sn-by { color: var(--text-dim); font-size:10.5px; font-weight:600; margin-top:5px; }

  /* 부킹 성사 내역 입력 */
  .booking-form { margin-top:11px; padding-top:11px; border-top:1px dashed var(--line); }
  .booking-form .bf-title { font-size:11.5px; color:var(--text-dim); font-weight:600; margin-bottom:9px; }
  .bf-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .bf-grid .bf-full { grid-column:1 / -1; }
  .bf-field label { display:block; font-size:10.5px; color:var(--text-dim); margin-bottom:4px; font-weight:600; }
  .bf-field input {
    width:100%; padding:9px 11px; border-radius:9px; border:1px solid var(--line);
    background:var(--bg-soft); color:var(--text); font-family:inherit; font-size:12.5px;
  }
  .bf-field input:focus { outline:none; border-color:var(--fairway-light); }
  .bf-field input::placeholder { color:#5d7768; }
  .booked-info { background:var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.7; margin-top:9px; }
  .booked-info .bi-title { font-size:10.5px; color:var(--fairway-light); font-weight:800; letter-spacing:0.3px; margin-bottom:5px; }
  .booked-info b { color:var(--text); font-weight:700; }

  /* 요청 수정/삭제 */
  .req-tools { display:flex; gap:6px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
  .req-tools .mini-btn { font-size:11.5px; padding:6px 11px; }
  .mini-btn.del { color:#ff9580; border-color:rgba(232,85,58,0.4); }
  .mini-btn.del:hover { background:rgba(232,85,58,0.14); }
  .edit-box { margin-top:11px; padding:13px; border:1px solid var(--gold); border-radius:12px; background:rgba(201,168,87,0.07); }
  .edit-box .eb-title { font-size:11.5px; font-weight:700; color:var(--gold); margin-bottom:10px; }
  .edit-box label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:4px; font-weight:600; }
  .edit-box input, .edit-box textarea {
    width:100%; padding:9px 11px; border-radius:9px; border:1px solid var(--line);
    background:var(--bg-soft); color:var(--text); font-family:inherit; font-size:13px; margin-bottom:10px;
  }
  .edit-box textarea { min-height:60px; resize:vertical; line-height:1.5; }
  .edit-box input:focus, .edit-box textarea:focus { outline:none; border-color:var(--fairway-light); }

  /* 운영자 진행 메모 */
  .progress-note { margin-top:11px; padding-top:11px; border-top:1px dashed var(--line); }
  .progress-note .pn-label { font-size:11.5px; color:var(--text-dim); font-weight:600; margin-bottom:7px; }
  .pn-saved { background:rgba(76,175,114,0.1); border:1px solid rgba(76,175,114,0.3); border-radius:10px; padding:10px 12px; font-size:12.5px; color:var(--text); line-height:1.55; margin-bottom:8px; white-space:pre-line; }
  .pn-saved .pn-by { color:var(--text-dim); font-size:10.5px; font-weight:600; margin-top:5px; }
  .pn-area { display:flex; gap:7px; align-items:flex-start; }
  .pn-area textarea {
    flex:1; min-height:42px; resize:vertical; font-family:inherit; font-size:12.5px;
    padding:9px 11px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg-soft); color:var(--text); line-height:1.5;
  }
  .pn-area textarea:focus { outline:none; border-color:var(--fairway-light); }
  .pn-area textarea::placeholder { color:#5d7768; }
  .pn-save { padding:9px 13px; border-radius:10px; border:none; background:var(--fairway); color:#fff; font-family:inherit; font-weight:700; font-size:12px; cursor:pointer; white-space:nowrap; }

  /* 멤버십 / 결제 */
  .pay-hero {
    text-align:center; padding: 8px 0 4px;
  }
  .pay-price { font-size: 40px; font-weight: 800; letter-spacing: -1px; }
  .pay-price small { font-size: 16px; color: var(--text-dim); font-weight: 600; }
  .pay-card {
    background: linear-gradient(135deg, rgba(76,175,114,0.14), rgba(201,168,87,0.08));
    border: 1px solid var(--line); border-radius: 18px; padding: 22px; margin: 22px 0;
  }
  .pay-card h4 { font-size: 15px; font-weight: 800; margin-bottom: 14px; }
  .pay-feat { display:flex; align-items:flex-start; gap:9px; font-size: 13.5px; margin-bottom: 11px; line-height:1.5; }
  .pay-feat .ck { color: var(--fairway-light); font-weight: 800; flex:0 0 auto; }
  .free-used-banner {
    background: rgba(201,168,87,0.14); border:1px solid rgba(201,168,87,0.4); color: var(--gold);
    border-radius: 13px; padding: 14px 16px; font-size: 13.5px; line-height:1.6; margin-bottom: 20px;
  }
  .auth-step { display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .auth-step:last-child { border-bottom:none; }
  .auth-dot { width:26px; height:26px; border-radius:50%; background:var(--bg-soft); border:1px solid var(--line); display:grid; place-items:center; font-size:12px; font-weight:700; color:var(--text-dim); flex:0 0 auto; }
  .auth-step.done .auth-dot { background:var(--fairway); border-color:var(--fairway); color:#fff; }

  .member-pill { font-size:10.5px; font-weight:800; padding:4px 10px; border-radius:20px; background:linear-gradient(135deg,var(--gold),#b8923f); color:#2a1e00; letter-spacing:0.3px; }
  .quota-note { font-size:12px; color:var(--text-dim); margin-top:10px; }
  .badge-member { background: rgba(201,168,87,0.2); color: var(--gold); }

  /* 요금제 선택 카드 */
  .plan-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin: 4px 0 8px; }
  .plan-opt {
    position:relative; border:1.5px solid var(--line); background:var(--card); border-radius:15px;
    padding:18px 16px; cursor:pointer; text-align:center; transition:all 0.18s; font-family:inherit; color:var(--text);
  }
  .plan-opt:hover { border-color:var(--fairway-light); }
  .plan-opt.sel { border-color:var(--fairway-light); background:rgba(76,175,114,0.14); box-shadow:0 0 0 3px rgba(76,175,114,0.15); }
  .plan-opt .p-name { font-size:13px; color:var(--text-dim); font-weight:700; margin-bottom:6px; }
  .plan-opt .p-price { font-size:24px; font-weight:800; letter-spacing:-0.6px; }
  .plan-opt .p-price small { font-size:13px; color:var(--text-dim); font-weight:600; }
  .plan-opt .p-sub { font-size:11.5px; color:var(--fairway-light); font-weight:700; margin-top:6px; min-height:15px; }
  .plan-opt .p-tag { position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-size:10px; font-weight:800; background:var(--gold); color:#2a1e00; padding:3px 10px; border-radius:20px; white-space:nowrap; }

  /* 자동갱신 동의 */
  .agree-box { display:flex; gap:10px; align-items:flex-start; padding:13px 15px; border:1px solid var(--line); border-radius:13px; background:var(--card); margin:14px 0 4px; cursor:pointer; }
  .agree-box input { margin-top:2px; width:18px; height:18px; accent-color:var(--fairway); flex:0 0 auto; cursor:pointer; }
  .agree-box .ag-text { font-size:12.5px; color:var(--text-dim); line-height:1.55; }
  .agree-box .ag-text b { color:var(--text); font-weight:700; }

  /* 운영자 검색 */
  .search-wrap { position:relative; margin-bottom:22px; }
  .search-wrap input {
    width:100%; padding:14px 16px 14px 42px; border-radius:14px;
    border:1px solid var(--line); background:var(--bg-soft); color:var(--text);
    font-family:inherit; font-size:14.5px;
  }
  .search-wrap input:focus { outline:none; border-color:var(--fairway-light); }
  .search-wrap input::placeholder { color:#5d7768; }

  .search-wrap .s-clear { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; display:none; }

  .cust-profile {
    background:linear-gradient(135deg, rgba(76,175,114,0.12), rgba(201,168,87,0.06));

  .cust-profile .cp-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cust-profile .cp-name { font-size:17px; font-weight:800; }
  .cust-profile .cp-phone { font-size:12.5px; color:var(--text-dim); }
  .cust-profile .cp-stats { display:flex; gap:10px; flex-wrap:wrap; }
  .cust-profile .cp-stat { flex:1; min-width:90px; background:var(--bg-soft); border:1px solid var(--line); border-radius:11px; padding:11px 13px; }
  .cust-profile .cp-stat .n { font-size:18px; font-weight:800; }
  .cust-profile .cp-stat .l { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .search-section-title { font-size:12.5px; color:var(--text-dim); font-weight:700; margin:18px 0 10px; }

  /* 카테고리 선택 */
  .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-top:8px; }
  .cat-card {
    border:1.5px solid var(--line); background:var(--card); border-radius:18px;

    color:var(--text); text-align:left; position:relative; overflow:hidden;
  }
  .cat-card:hover { border-color:var(--fairway-light); transform:translateY(-3px); box-shadow:0 14px 30px -16px rgba(76,175,114,0.5); }

  .cat-card .cat-name { font-size:16.5px; font-weight:800; letter-spacing:-0.3px; margin-bottom:5px; }

  .cat-card .cat-badge { position:absolute; top:13px; right:13px; font-size:9.5px; font-weight:800; padding:3px 8px; border-radius:20px; background:rgba(201,168,87,0.2); color:var(--gold); }
  /* 카테고리 화면: 카드가 세로 공간을 적절히 채우도록 */
  .cat-screen { display:flex; flex-direction:column; }
  .cat-screen .cat-grid { flex:1 1 auto; align-content:stretch; }
  .cat-screen .cat-card { display:flex; flex-direction:column; }
  .cat-screen .cat-card .cat-desc { margin-top:auto; }
  /* 내 정보 카드(서비스 선택 상단) */
  .me-card { background:linear-gradient(135deg, rgba(76,175,114,0.16), rgba(201,168,87,0.08)); border:1px solid var(--line); border-radius:16px; padding:16px 18px; margin-bottom:20px; }
  .me-card .me-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .me-card .me-name { font-size:16px; font-weight:800; }
  .me-card .me-grade { font-size:12px; color:var(--text-dim); margin-top:2px; }
  .me-card .me-usage { font-size:12.5px; color:#c5d6cb; margin-top:10px; line-height:1.5; }
  .me-card .me-btn { margin-top:13px; width:100%; padding:11px; border-radius:11px; border:1px solid var(--line); background:var(--bg-soft); color:var(--text); font-family:inherit; font-weight:700; font-size:13.5px; cursor:pointer; }
  .me-card .me-btn:hover { background:rgba(255,255,255,0.06); }
  .me-join { background:rgba(201,168,87,0.1); border:1px solid rgba(201,168,87,0.3); border-radius:16px; padding:15px 18px; margin-bottom:20px; font-size:13.5px; color:#e7dcc0; line-height:1.55; }
  .me-join b { color:var(--gold); }
  /* 내 요청 내역 */
  .my-req { border:1px solid var(--line); border-radius:13px; padding:13px 15px; margin-bottom:10px; background:var(--card); }
  .my-req .mr-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .my-req .mr-cat { font-size:13.5px; font-weight:700; }
  .my-req .mr-detail { font-size:12.5px; color:var(--text-dim); line-height:1.5; }
  .my-req .mr-date { font-size:11px; color:#7c9486; margin-top:6px; }
  /* 서비스 선택 하단 '내 정보' 섹션 */
  .me-section { margin-top:24px; padding-top:20px; border-top:1px solid var(--line); }
  .me-section .ms-title { font-size:13px; font-weight:700; color:var(--text-dim); margin-bottom:12px; }
  .me-section .me-card { margin-bottom:0; }
  .me-guest { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 18px; }
  .me-guest .mg-text { font-size:13px; color:var(--text-dim); line-height:1.55; margin-bottom:13px; }
  .me-guest .mg-btns { display:flex; gap:8px; }
  .me-guest .mg-btn { flex:1; padding:11px; border-radius:11px; border:1px solid var(--line); background:var(--bg-soft); color:var(--text); font-family:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .me-guest .mg-btn.gold { color:var(--gold); border-color:rgba(201,168,87,0.4); }
  .me-guest .mg-btn:hover { background:rgba(255,255,255,0.06); }

  /* 간단 문의 폼 */
  .inquiry-field { margin-bottom:16px; }
  .inquiry-field label { display:block; font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text-dim); }
  .inquiry-field textarea {
    width:100%; min-height:110px; resize:vertical; padding:14px 15px; border-radius:13px;
    border:1.5px solid var(--line); background:var(--card); color:var(--text);
    font-family:inherit; font-size:14.5px; line-height:1.6;
  }
  .inquiry-field textarea:focus { outline:none; border-color:var(--fairway-light); }
  .inquiry-field textarea::placeholder { color:#5d7768; }

  /* ===== 인트로 (스플래시) ===== */
  #intro {
    position: fixed; inset: 0; z-index: 1000; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    background: #07140d;
  }
  #intro video, #intro .intro-fallback {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  #intro video { z-index: 1; }
  /* 영상 없을 때의 풍경 배경 */
  .intro-fallback {
    background: linear-gradient(160deg, #0e2417 0%, #07140d 60%, #050f09 100%);
  }
  .scene-svg { position:absolute; inset:0; width:100%; height:100%; }
  .scene-svg .flag { transform-box: fill-box; transform-origin: left center; animation: wave 2.8s ease-in-out infinite; }
  @keyframes wave {
    0%,100% { transform: scaleX(1) skewY(0deg) translateY(0); }
    35% { transform: scaleX(0.93) skewY(-3deg) translateY(-1px); }
    70% { transform: scaleX(0.97) skewY(2.5deg) translateY(1px); }
  }
  .scene-svg .cloud-a { animation: drift 38s linear infinite; opacity:0.92; }
  .scene-svg .cloud-b { animation: drift 52s linear infinite; opacity:0.8; }
  .scene-svg .cloud-c { animation: drift 46s linear infinite; opacity:0.72; }
  @keyframes drift {
    0% { transform: translateX(-120px); }
    100% { transform: translateX(900px); }
  }
  /* 스윙 궤적 + 공 */
  .swing-path { fill:none; stroke:rgba(244,241,232,0.6); stroke-width:2.5; stroke-linecap:round; stroke-dasharray: 1200; stroke-dashoffset:1200; animation: draw 4s ease-in-out infinite; }
  @keyframes draw {
    0% { stroke-dashoffset:1200; opacity:0; }
    12% { opacity:1; }
    55% { stroke-dashoffset:0; opacity:1; }
    78% { opacity:0.12; }
    100% { stroke-dashoffset:0; opacity:0; }
  }
  .ball { fill:#fff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.85)); offset-path: path('M 90 540 Q 320 110 558 350'); animation: fly 4s ease-in-out infinite; }
  @keyframes fly {
    0%{ offset-distance:0%; opacity:0; }
    12%{ opacity:1; }
    55%{ offset-distance:100%; opacity:1; }
    78%,100%{ offset-distance:100%; opacity:0; }
  }
  /* 어둡게 깔리는 오버레이 (글자 가독성) */
  .intro-scrim {
    position:absolute; inset:0; z-index:2;
    background: linear-gradient(to top, rgba(5,15,9,0.92) 0%, rgba(5,15,9,0.55) 38%, rgba(5,15,9,0.15) 70%, transparent 100%);
  }
  .intro-content {
    position: relative; z-index: 3; padding: 0 30px 56px; max-width: 560px; margin: 0 auto; width: 100%;
    animation: introUp 1s cubic-bezier(.2,.7,.3,1) both; animation-delay: 0.3s;
  }
  @keyframes introUp { from{ opacity:0; transform: translateY(28px); } to{ opacity:1; transform:none; } }
  .intro-kicker {
    display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:700; letter-spacing:2px;
    color: var(--gold); margin-bottom: 18px; text-transform: uppercase;
  }
  .intro-kicker::before { content:'⛳'; font-size:15px; }
  .intro-headline {
    font-family: 'Gowun Batang', serif; font-size: 30px; line-height: 1.4; font-weight: 700;
    color: #fff; letter-spacing: -0.5px; margin-bottom: 22px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .intro-headline .em { color: var(--fairway-light); }
  .intro-brand {
    display:flex; align-items:center; gap:13px; margin-bottom: 30px;
    padding: 16px 18px; border-radius: 16px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
  }
  .intro-brand .ib-mark { width:46px; height:46px; border-radius:13px; background:linear-gradient(135deg,var(--fairway-light),var(--fairway)); display:grid; place-items:center; font-size:24px; flex:0 0 auto; }
  .intro-brand .ib-text b { display:block; font-size:17px; font-weight:800; color:#fff; letter-spacing:-0.3px; }
  .intro-brand .ib-text span { font-size:12.5px; color:rgba(244,241,232,0.7); }
  .intro-cta {
    width:100%; padding:18px; border:none; border-radius:15px; cursor:pointer;
    font-family:inherit; font-weight:800; font-size:16px; color:#fff;
    background: linear-gradient(135deg, var(--fairway-light), var(--fairway));
    box-shadow: 0 14px 34px -12px rgba(76,175,114,0.8);
    transition: transform 0.18s;
  }
  .intro-cta:hover { transform: translateY(-2px); }
  .intro-sub-row { display:flex; gap:10px; margin-top:14px; }
  .intro-sub-btn {
    flex:1; padding:12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.16);
    border-radius:11px; color:rgba(244,241,232,0.85); font-family:inherit; font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.18s;
  }
  .intro-sub-btn:hover { background:rgba(255,255,255,0.14); color:#fff; }
  .intro-sub-btn.join { color:var(--gold); border-color:rgba(201,168,87,0.45); }
  .intro-sub-btn.join:hover { background:rgba(201,168,87,0.18); }
  #intro.hide { opacity:0; pointer-events:none !important; visibility:hidden; transition: opacity 0.5s; }

  /* ===== 모바일 가독성: 폰 화면에서 글자 키우기 ===== */
  @media (max-width: 600px) {
    body { font-size: 16px; }
    /* 상단바: 브랜드(위) + 탭(아래) 2단으로 배치 → 끊김 방지 */
    .topbar { flex-direction: column; align-items: stretch; gap: 12px; padding-left: 16px; padding-right: 16px; }
    .brand { gap: 10px; }
    .brand-mark { width: 36px; height: 36px; font-size: 19px; flex-shrink: 0; }
    .brand-name { font-size: 17px; letter-spacing: -0.4px; white-space: nowrap; }
    .brand-name small { font-size: 11px; white-space: nowrap; }
    /* 탭: 가로로 균등 분배, 한 줄 유지 */
    .tabs { width: 100%; gap: 4px; padding: 4px; }
    .tab { flex: 1; font-size: 13px; padding: 9px 4px; font-weight: 700; white-space: nowrap; text-align: center; }
    .tab-badge { font-size: 9.5px; padding: 1px 5px; }

    /* 신청 단계 화면 */
    .step-tag { font-size: 13.5px; }
    .step-title { font-size: 25px; }
    .step-sub { font-size: 16px; }
    .opt .o-main { font-size: 17px; }
    .opt .o-desc { font-size: 13.5px; }
    .field label { font-size: 14.5px; }
    .field input, .field select, .field textarea { font-size: 16.5px; }
    .inquiry-field label { font-size: 14.5px; }
    .inquiry-field textarea { font-size: 16.5px; }
    .btn { font-size: 16px; }
    .note { font-size: 13.5px; }
    .quota-note { font-size: 13.5px; }

    /* 카테고리 카드 */
    .cat-card .cat-name { font-size: 18px; }
    .cat-card .cat-desc { font-size: 13.5px; color: #cfe0d5; }
    .cat-card .cat-emoji { font-size: 33px; }

    /* 달력 */
    .cal-day { font-size: 15.5px; }
    .cal-dow { font-size: 13px; }
    .cal-month { font-size: 16px; }

    /* 요약/완료 카드 */
    .sum-row .k { font-size: 14px; }
    .sum-row .v { font-size: 14.5px; }
    .summary-card { font-size: 14.5px; }

    /* 운영자·비서 카드 */
    .panel h3 { font-size: 16.5px; }
    .req-name { font-size: 16.5px; }
    .req-phone { font-size: 13px; }
    .chip { font-size: 13px; }
    .mini-btn { font-size: 13px; padding: 8px 13px; }
    select.assign-select { font-size: 13px; }
    .status { font-size: 12.5px; }
    .saved-note, .booked-info { font-size: 13px; }
    .sec-name { font-size: 15.5px; }
    .sec-meta { font-size: 12.5px; }
    .stat .num { font-size: 22px; }
    .stat .lab { font-size: 12px; }
    .search-wrap input { font-size: 16px; }

    /* 인트로 */
    .intro-cta { font-size: 16.5px; }
    .intro-sub-btn { font-size: 14px; }
    /* 카테고리 화면: 화면 세로를 채워 아래 여백 줄이기 */
    #view-user.is-category { min-height: calc(100vh - var(--topbar-h, 120px) - 60px); display:flex; flex-direction:column; }
    #view-user.is-category #step-host { flex:1 1 auto; display:flex; flex-direction:column; }
    .cat-screen { min-height: 100%; }
    .cat-screen .cat-grid { margin-top:14px; }
    .cat-screen .cat-card { padding:20px 18px; min-height:150px; }
    .cat-screen .cat-card .cat-emoji { font-size:34px; margin-bottom:14px; }
  }
  @media (max-width: 360px) {
    .step-title { font-size: 22px; }
    .topbar { padding-left: 12px; padding-right: 12px; }
    .tab { font-size: 12px; padding: 9px 2px; }
  }
</style>
</head>
<body>

<!-- ================= 인트로 (스플래시) ================= -->
<div id="intro">
  <!-- 배경 fallback (영상 로딩 전/실패 시 보임) -->
  <div class="intro-fallback"></div>

  <!-- 실제 영상: 여자 골퍼 스윙 (Pexels, Kampus Production, 무료 라이선스)
       Pexels는 외부 직접재생(핫링크)을 제한하므로, 실제 서비스에서는 영상 파일을
       본인 서버/CDN에 올린 뒤 아래 src를 그 주소로 교체하세요.
       영상이 로드되지 않으면 자동으로 아래 골프장 풍경 연출이 보입니다. -->
  <video autoplay muted loop playsinline id="intro-video"
    onerror="this.style.display='none'"
    poster="https://images.pexels.com/videos/6541665/pexels-photo-6541665.jpeg?auto=compress&cs=tinysrgb&h=627&fit=crop&w=1200">
    <source src="https://videos.pexels.com/video-files/6541665/6541665-uhd_1440_2560_25fps.mp4" type="video/mp4" onerror="document.getElementById('intro-video').style.display='none'">
  </video>

  <!-- 영상 없을 때 보이는 골프장 풍경 + 스윙 연출 -->
  <svg class="scene-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3a7bc8"/>
        <stop offset="45%" stop-color="#5fa3d9"/>
        <stop offset="100%" stop-color="#a9d4ec"/>
      </linearGradient>
      <radialGradient id="sun" cx="74%" cy="20%" r="42%">
        <stop offset="0%" stop-color="rgba(255,168,76,0.75)"/>
        <stop offset="45%" stop-color="rgba(255,168,76,0.2)"/>
        <stop offset="100%" stop-color="rgba(255,168,76,0)"/>
      </radialGradient>
      <radialGradient id="cloud" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="70%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4a9e64"/>
        <stop offset="100%" stop-color="#33784b"/>
      </linearGradient>
      <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5bab72"/>
        <stop offset="100%" stop-color="#3d8455"/>
      </linearGradient>
      <linearGradient id="fairway" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#52b377"/>
        <stop offset="100%" stop-color="#2c6b45"/>
      </linearGradient>
    </defs>

    <!-- 하늘 + 햇살 -->
    <rect width="800" height="600" fill="url(#sky)"/>
    <rect width="800" height="600" fill="url(#sun)"/>
    <circle cx="592" cy="120" r="40" fill="#ff9d42"/>
    <circle cx="592" cy="120" r="66" fill="rgba(255,157,66,0.25)"/>

    <!-- 구름 (천천히 흐름) -->
    <g class="clouds" fill="url(#cloud)">
      <g class="cloud-a">
        <ellipse cx="170" cy="120" rx="70" ry="26"/>
        <ellipse cx="220" cy="106" rx="52" ry="30"/>
        <ellipse cx="120" cy="108" rx="44" ry="24"/>
      </g>
      <g class="cloud-b">
        <ellipse cx="640" cy="210" rx="58" ry="22"/>
        <ellipse cx="600" cy="198" rx="42" ry="24"/>
        <ellipse cx="684" cy="200" rx="38" ry="20"/>
      </g>
      <g class="cloud-c">
        <ellipse cx="400" cy="80" rx="50" ry="20"/>
        <ellipse cx="438" cy="70" rx="38" ry="22"/>
      </g>
    </g>

    <!-- 먼 능선 -->
    <path d="M0 300 Q 200 250 420 285 T 800 270 L800 600 L0 600 Z" fill="url(#hill2)" opacity="0.85"/>
    <path d="M0 350 Q 260 300 520 340 T 800 330 L800 600 L0 600 Z" fill="url(#hill1)"/>

    <!-- 페어웨이 -->
    <path d="M0 600 L0 430 Q 400 360 800 470 L800 600 Z" fill="url(#fairway)"/>
    <!-- 페어웨이 스트라이프(잔디 결) -->
    <g opacity="0.10" stroke="#ffffff" stroke-width="2">
      <path d="M120 600 Q 380 440 520 410" fill="none"/>
      <path d="M260 600 Q 460 460 600 430" fill="none"/>
      <path d="M420 600 Q 560 480 690 455" fill="none"/>
    </g>

    <!-- 골프장 그린 + 핀 깃발 (능선 위쪽, 조금 작게) -->
    <g transform="translate(560,330) scale(0.7)">
      <!-- 퍼팅 그린 (밝은 잔디 타원) -->
      <ellipse cx="0" cy="14" rx="180" ry="46" fill="#3f9d66" opacity="0.85"/>
      <ellipse cx="0" cy="14" rx="180" ry="46" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <!-- 깃대 그림자 -->
      <ellipse cx="14" cy="14" rx="60" ry="10" fill="rgba(0,0,0,0.22)"/>
      <!-- 홀컵 -->
      <ellipse cx="0" cy="10" rx="11" ry="4.5" fill="#0c2218"/>
      <ellipse cx="0" cy="9" rx="11" ry="4.5" fill="#06160e"/>
      <!-- 깃대 -->
      <rect x="-2" y="-150" width="4" height="160" rx="2" fill="#f1ece0"/>
      <rect x="-2" y="-150" width="2" height="160" rx="1" fill="rgba(255,255,255,0.5)"/>
      <!-- 깃봉(꼭대기 구슬) -->
      <circle cx="0" cy="-152" r="5" fill="#c9a857"/>
      <!-- 깃발 (펄럭임) -->
      <g class="flag">
        <path d="M2 -150 C 50 -144 70 -158 116 -150 C 100 -132 100 -122 116 -106 C 70 -114 50 -100 2 -106 Z" fill="#e8553a"/>
        <path d="M2 -150 C 50 -144 70 -158 116 -150 C 100 -132 100 -122 116 -106 C 70 -114 50 -100 2 -106 Z" fill="rgba(0,0,0,0.10)" opacity="0.4" transform="translate(0,2)"/>
      </g>
    </g>

    <!-- 스윙 궤적 + 날아가는 공 (핀을 향해 날아가 그린에 안착) -->
    <path class="swing-path" d="M 90 540 Q 320 110 558 350"/>
    <circle class="ball" r="6" cx="0" cy="0"/>
  </svg>

  <div class="intro-scrim"></div>

  <div class="intro-content">
    <div class="intro-kicker">최고의 골프 전담 비서</div>
    <div class="intro-headline">당신은 <span class="em">라운딩</span>만 하세요.<br>부킹은 <span class="em">김비서</span>가 찾아드립니다.</div>
    <div class="intro-brand">
      <div class="ib-mark">⛳</div>
      <div class="ib-text">
        <b>골프부킹 김비서</b>
        <span>날짜·지역·시간만 알려주시면, 전담 비서가 가능한 부킹을 찾아드려요.</span>
      </div>
    </div>
    <button class="intro-cta" onclick="enterApp()">부킹 시작하기</button>
    <div class="intro-sub-row">
      <button class="intro-sub-btn" onclick="goFreeJoin()">무료회원 가입하기</button>
      <button class="intro-sub-btn join" onclick="goJoinMembership()">유료회원 가입하기</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="brand" onclick="showIntro()" style="cursor:pointer" title="처음 화면으로">
    <div class="brand-mark">⛳</div>
    <div class="brand-name">골프부킹 김비서<small>당신만의 라운딩 컨시어지</small></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-user" onclick="switchTab('user')">예약 신청</button>
    <button class="tab" id="tab-admin" onclick="switchTab('admin')">운영자<span class="tab-badge" id="tab-badge" style="display:none">0</span></button>
    <button class="tab" id="tab-pro" onclick="switchTab('pro')">비서 보기<span class="tab-badge" id="tab-badge-pro" style="display:none">0</span></button>
  </div>
</div>

<!-- ================= USER FLOW ================= -->
<div id="view-user" class="wrap">
  <div class="progress" id="progress"></div>
  <div id="step-host"></div>
</div>

<!-- ================= ADMIN ================= -->
<div id="view-admin" class="wrap wide" style="display:none">
  <div class="admin-head">
    <div>
      <h2>운영자 대시보드</h2>
      <p>들어온 부킹 요청을 확인하고, 비서에게 배정한 뒤 직접 전화로 매칭합니다.</p>
    </div>
    <button class="mini-btn" onclick="resetAll()">🗑 전체 기록 초기화</button>
  </div>
  <div class="stat-row" id="stats"></div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input id="admin-search" placeholder="손님 이름·전화번호·골프장·담당 비서로 검색" oninput="onAdminSearch()">
    <button class="s-clear" id="search-clear" onclick="clearAdminSearch()">✕</button>
  </div>
  <div id="search-result"></div>
  <div class="admin-grid" id="admin-main">
    <div class="panel">
      <h3>📩 부킹 요청</h3>

<script>
/* ============ DB (IndexedDB 영속 저장) ============ */
const DB_NAME = 'golf_kim_db', STORE = 'kv';
let _db = null;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = ()=>{ r.result.createObjectStore(STORE); };
    r.onsuccess = ()=>{ _db = r.result; res(_db); };
    r.onerror = ()=>rej(r.error);
  });
}
function dbGet(key){
  return new Promise((res)=>{
    if(!_db) return res(null);
    const t = _db.transaction(STORE,'readonly').objectStore(STORE).get(key);
    t.onsuccess = ()=>res(t.result ?? null);
    t.onerror = ()=>res(null);
  });
}
function dbSet(key,val){
  return new Promise((res)=>{
    if(!_db) return res();
    const t = _db.transaction(STORE,'readwrite').objectStore(STORE).put(val,key);
    t.onsuccess = ()=>res(); t.onerror = ()=>res();
  });
}
function persist(){ dbSet('requests', requests); dbSet('secretaries', secretaries); dbSet('rrIndex', rrIndex); dbSet('customerNotes', customerNotes); dbSet('members', members); dbSet('freeMembers', freeMembers); dbSet('currentUser', currentUser); }

/* ============ STATE ============ */
const REGIONS = ['수도권 북부','수도권 남부','인천·영종','강원','충청','경상','전라','제주'];
const SIDO = ['서울','경기','인천','강원','충북','충남','대전','세종','전북','전남','광주','경북','경남','부산','대구','울산','제주'];
const SEOUL_SUB = ['한강이북','한강이남'];
const TIMES = [
  {k:'새벽 (05–07시)', d:'얼리버드'},
  {k:'오전 (07–09시)', d:'아침이 좋아!'},
  {k:'2부 (10–12시)', d:'3부제 운영 골프장'},
  {k:'점심 (12–14:30)', d:'여유로운 라운딩'},
  {k:'야간 (15시 이후)', d:'야간 라운딩'},
];
const PRIORITIES = [
  {id:'vip', emoji:'🤝', main:'접대 우선', desc:'가까우면 비싸도 OK'},
  {id:'eco', emoji:'💰', main:'가성비 우선', desc:'저렴한 곳 위주로'},
];

const MEMBERSHIP_REGIONS = ['수도권','강원','충청','호남','영남','제주'];
const TOUR_PEOPLE = ['2명','3명','4명','6명','두 팀 이상'];
const OVERSEAS_COUNTRIES = ['태국','베트남','필리핀','일본','중국','말레이시아','인도네시아','대만','기타'];
const CATEGORIES = {
  golf:       { emoji:'⛳', name:'골프부킹',   desc:'날짜·지역·시간 맞춤으로 가능한 부킹을 안내해드립니다', badge:'대표 서비스' },
  overnight:  { emoji:'🏞️', name:'국내 투어',  desc:'국내 골프 투어·숙박 패키지를 찾아드려요' },
  overseas:   { emoji:'✈️', name:'해외 투어',  desc:'동남아·일본 등 해외 골프 투어 상담' },
  membership: { emoji:'📜', name:'회원권 상담', desc:'골프장 및 콘도 회원권 매매·시세 상담' },
};

let state = { category:null, date:null, region:null, time:null, origin:null, priority:null, name:'', phone:'' };
let step = 0;
// step 0은 항상 카테고리 선택. 골프부킹은 이후 date~done, 그 외는 inquiry→done
const STEPS = ['category','date','time','region','origin','priority','contact','pay','done'];
const INQUIRY_STEPS = ['category','inquiry','done'];

let requests = [];
let secretaries = [
  {name:'김비서(나)', count:0, owner:true},
  {name:'박프로', count:0},
  {name:'이매니저', count:0},
];
let assignMode = 'manual';
let rrIndex = 0; // round-robin pointer
let calMonth = new Date();
// 한국 공휴일 (YYYY-MM-DD). 2026년 기준 + 양력 고정 공휴일(연도 무관 MM-DD)
const HOLIDAYS_FIXED = ['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];
const HOLIDAYS_2026 = [
  '2026-02-16','2026-02-17','2026-02-18', // 설날 연휴
  '2026-05-24','2026-05-25',              // 부처님오신날(24) + 대체(25)
  '2026-09-24','2026-09-25','2026-09-26', // 추석 연휴
  '2026-09-27',                           // 추석 대체공휴일
];
function isHoliday(date){
  const y=date.getFullYear();
  const mmdd = `${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const ymd = `${y}-${mmdd}`;
  return HOLIDAYS_FIXED.includes(mmdd) || HOLIDAYS_2026.includes(ymd);
}
let customerNotes = {}; // { "01012345678": { text, flagged, by, at } }
let members = {};       // 유료회원 { phone: { plan, expiresAt, since, autoRenew, name } }
let freeMembers = {};   // 무료회원 { phone: { since, name } }
let currentUser = null; // 가입 완료한 사용자 { name, phone } → 폼 자동 입력용

// 요금제 (원)
const PLANS = {
  monthly: { label: '월 이용권', price: 30000,  period: '월',  days: 30 },
  yearly:  { label: '연 이용권', price: 120000, period: '년',  days: 365 },
};
// 무료회원 사용 제한
const FREE_LIMIT_PER_MONTH = 1;  // 한 달 1회
const FREE_LIMIT_PER_YEAR  = 3;  // 연 3회

// 전화번호 정규화 (하이픈/공백 제거) → 손님 식별 키
function phoneKey(p){ return (p||'').replace(/[^0-9]/g,''); }
// 일정/인원/지역 폼을 쓰는 투어 카테고리(국내·해외)
function isTourCategory(cat){ return cat==='overnight' || cat==='overseas'; }
function getNote(phone){ return customerNotes[phoneKey(phone)] || null; }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 이번 달 식별자 (예: "2026-06")
function curMonthKey(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function ymKey(ts){ const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// 등급 판정
function isPaidMember(phone){ const m=members[phoneKey(phone)]; return !!(m && m.expiresAt && m.expiresAt > Date.now()); }
function isFreeMember(phone){ return !!freeMembers[phoneKey(phone)]; }
function isMember(phone){ return isPaidMember(phone); } // 기존 호출 호환(유료회원)

// 성공 완료된 부킹 건수 (이번 달 / 올해)
function successThisMonth(phone){
  const key=phoneKey(phone), mk=curMonthKey();
  return requests.filter(r=>phoneKey(r.phone)===key && r.status==='success' && r.closedAt && ymKey(r.closedAt)===mk).length;
}
function successThisYear(phone){
  const key=phoneKey(phone), y=new Date().getFullYear();
  return requests.filter(r=>phoneKey(r.phone)===key && r.status==='success' && r.closedAt && new Date(r.closedAt).getFullYear()===y).length;
}
// 하위 호환용 별칭
function successCountThisMonth(phone){ return successThisMonth(phone); }

// 새 신청 시 결제가 필요한가? (등급별)
function needsPayment(phone){
  if(isPaidMember(phone)) return false;            // 유료회원: 무제한
  if(isFreeMember(phone)){
    // 무료회원: 이번 달 1회 미만 && 올해 3회 미만이면 무료 가능
    const monthOk = successThisMonth(phone) < FREE_LIMIT_PER_MONTH;
    const yearOk  = successThisYear(phone)  < FREE_LIMIT_PER_YEAR;
    return !(monthOk && yearOk);                   // 한도 초과면 결제 필요
  }
  // 비회원: 성공 1회까지 무료, 이후 무조건 결제
  return successThisYear(phone) >= 1 || successThisMonth(phone) >= 1;
}
// 결제가 필요한 이유 (안내문구용)
function paymentReason(phone){
  if(isFreeMember(phone)){
    if(successThisMonth(phone) >= FREE_LIMIT_PER_MONTH) return 'month';
    if(successThisYear(phone)  >= FREE_LIMIT_PER_YEAR)  return 'year';
  }
  return 'nonmember';
}
// 멤버 배지용 라벨
function memberBadge(phone){
  if(isPaidMember(phone)){
    const m = members[phoneKey(phone)];
    const label = (m && PLANS[m.plan]) ? PLANS[m.plan].period : '';
    return `<span class="member-pill" style="margin-left:7px">⭐ ${label}멤버</span>`;
  }
  if(isFreeMember(phone)) return `<span class="member-pill" style="margin-left:7px;background:rgba(76,175,114,0.22);color:var(--fairway-light)">무료회원</span>`;
  return '';
}

/* ============ TAB SWITCH ============ */
function switchTab(t){
  document.getElementById('tab-user').classList.toggle('active', t==='user');
  document.getElementById('tab-admin').classList.toggle('active', t==='admin');
  document.getElementById('tab-pro').classList.toggle('active', t==='pro');
  document.getElementById('view-user').style.display = t==='user'?'block':'none';
  document.getElementById('view-admin').style.display = t==='admin'?'block':'none';

  if(t==='admin'){ unseenCount=0; updateBadge(); renderAdmin(); }
  if(t==='pro'){ renderPro(); }
}

/* ============ USER FLOW RENDER ============ */
// 현재 진행 중인 흐름 (골프부킹은 STEPS, 그 외는 INQUIRY_STEPS)
function activeSteps(){ return (state.category && state.category!=='golf') ? INQUIRY_STEPS : STEPS; }

function renderProgress(){
  const p = document.getElementById('progress');
  const steps = activeSteps();
  // 골프부킹: category 제외 6단계(date~contact)만 표시. 그 외/카테고리 화면: 진행바 숨김
  if(state.category==='golf'){
    p.style.display = 'flex';
    p.innerHTML = steps.slice(1,7).map((_,i)=>`<span class="${(i+1)<=step?'done':''}"></span>`).join('');
  } else {
    p.style.display = 'none';
    p.innerHTML = '';
  }
}

function fmtDate(d){
  if(!d) return '';
  const days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
// "2026년 6월 15일 (월)" → "6/15(월)" (부킹 입력칸 기본값용)
function shortDate(longStr){
  if(!longStr) return '';
  const m = longStr.match(/(\d+)월\s*(\d+)일\s*\(([^)]+)\)/);
  return m ? `${m[1]}/${m[2]}(${m[3]})` : longStr;
}

function renderStep(){
  // 가입한 회원이면 이름·연락처 자동 채움 (비어 있을 때만)
  if(currentUser){
    if(!state.name) state.name = currentUser.name || '';
    if(!state.phone) state.phone = currentUser.phone || '';
  }
  // 브라우저 히스토리에 현재 단계 기록 (뒤로가기 버튼 연동)
  syncHistory();
  // 내 요청 내역 화면이 활성화돼 있으면 그것을 렌더
  if(state.viewMyReqs){ renderMyRequests(); return; }
  renderProgress();
  const host = document.getElementById('step-host');
  const cur = activeSteps()[step];
  // 카테고리 화면일 때만 세로 채움 레이아웃 클래스 부여

      <div class="cat-screen">
        <div class="step-tag">서비스 선택</div>
        <div class="step-title">어떤 도움이 필요하세요?</div>

          ${Object.keys(CATEGORIES).map(k=>{

              <span class="cat-name">${c.name}</span>
              <span class="cat-desc">${c.desc}</span>

        </div>
        ${myInfoSection()}
      </div>`;
    return;
  }

  if(cur==='inquiry'){
    const c = CATEGORIES[state.category] || {};
    const isMembership = state.category==='membership';
    const isTour = state.category==='overnight' || state.category==='overseas';
    const isOverseas = state.category==='overseas';
    if(isMembership && !state.dealType) state.dealType = 'buy';
    const membershipFields = isMembership ? `
      <div class="field">
        <label>매도 / 매수</label>
        <div class="opt-grid cols2">
          <button class="opt ${state.dealType==='buy'?'sel':''}" onclick="pickDeal('buy')" style="align-items:center;text-align:center"><span class="o-main">매수 (사고 싶어요)</span></button>

      </div>
      <div class="field">
        <label>희망 지역권</label>
        <div class="opt-grid cols3">
          ${MEMBERSHIP_REGIONS.map(rg=>`<button class="opt ${state.memRegion===rg?'sel':''}" onclick="pickMemRegion('${rg}')" style="align-items:center;text-align:center"><span class="o-main">${rg}</span></button>`).join('')}

      </div>` : '';
    const regionList = isOverseas ? OVERSEAS_COUNTRIES : MEMBERSHIP_REGIONS;
    const regionLabel = isOverseas ? '여행 국가' : '희망 지역';
    const tourFields = isTour ? `
      <div class="field">
        <label>일정 (달력에서 출발일·도착일을 차례로 선택)</label>
        <div class="cal-head">
          <button onclick="moveMonth(-1)">‹</button>

      <div class="field">
        <label>${regionLabel}</label>
        <div class="opt-grid cols3">
          ${regionList.map(rg=>`<button class="opt ${state.memRegion===rg?'sel':''}" onclick="pickMemRegion('${rg}')" style="align-items:center;text-align:center"><span class="o-main">${rg}</span></button>`).join('')}

    const inqLabel = isMembership ? '원하는 골프장·콘도 / 요청사항' : (isTour ? '원하는 골프장 / 요청사항' : '문의 내용');
    host.innerHTML = `
      <div class="step-tag">${c.name} 문의</div>
      <div class="step-title">${c.emoji} ${c.name} 상담 신청</div>

      <div class="field"><label>연락처</label><input id="in-phone" placeholder="010-0000-0000" value="${escapeHtml(state.phone)}" oninput="onInquiry()"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" onclick="goCategory()">이전</button>
        <button class="btn btn-primary" id="inq-btn" onclick="submitInquiry()" ${(state.inquiry&&state.name&&state.phone)?'':'disabled'}>상담 신청하기</button>
      </div>`;
    if(isTour) renderCalendar();
    return;
  }

  if(cur==='date'){
    host.innerHTML = `
      <div class="step-tag">STEP 1</div>
      <div class="step-title">언제 라운딩 하실까요?</div>
      <div class="step-sub">원하시는 날짜를 골라주세요.</div>

      </div>
      <div class="cal-grid" id="cal-grid"></div>

        <button class="btn btn-ghost" onclick="goCategory()">이전</button>
        <button class="btn btn-primary" id="next-btn" onclick="next()" ${state.date?'':'disabled'}>다음</button>
      </div>`;
    renderCalendar();
  }

  if(cur==='region'){
    host.innerHTML = `
      <div class="step-tag">STEP 3</div>
      <div class="step-title">어느 지역을 원하세요?</div>
      <div class="step-sub">희망하시는 골프장 권역을 선택해 주세요.</div>
      <div class="opt-grid cols2">
        ${REGIONS.map(r=>`<button class="opt ${state.region===r?'sel':''}" onclick="pick('region','${r}')"><span class="o-main">${r}</span></button>`).join('')}
      </div>
      ${navButtons()}`;
  }

  if(cur==='time'){
    host.innerHTML = `
      <div class="step-tag">STEP 2</div>
      <div class="step-title">선호하는 시간대는?</div>
      <div class="step-sub">티오프 희망 시간대를 골라주세요.</div>
      <div class="opt-grid cols2">
        ${TIMES.map(t=>`<button class="opt ${state.time===t.k?'sel':''}" onclick="pick('time','${t.k}')"><span class="o-main">${t.k}</span><span class="o-desc">${t.d}</span></button>`).join('')}
      </div>
      ${navButtons()}`;

/* ============ CALENDAR ============ */
function renderCalendar(){
  document.getElementById('cal-month').textContent = `${calMonth.getFullYear()}년 ${calMonth.getMonth()+1}월`;
  const grid = document.getElementById('cal-grid');
  const dow = ['일','월','화','수','목','금','토'];
  let html = dow.map((d,i)=>{
    const col = (i===0||i===6)?'color:var(--flag)':'';
    return `<div class="cal-dow" style="${col}">${d}</div>`;
  }).join('');
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const isTour = isTourCategory(state.category);
  for(let i=0;i<first;i++) html+='<div></div>';
  for(let d=1;d<=days;d++){
    const date = new Date(y,m,d);
    const past = date < today;
    const wd = date.getDay();
    const hol = isHoliday(date);
    let dayCls = '';
    if(wd===0 || wd===6 || hol) dayCls='sun';  // 토·일·공휴일 모두 빨강
    let cls = '';
    if(isTour){
      // 범위 강조: 시작/끝/중간
      const ts = date.getTime();
      const s = state.startDate ? new Date(state.startDate).setHours(0,0,0,0) : null;
      const e = state.endDate ? new Date(state.endDate).setHours(0,0,0,0) : null;
      if(s && ts===s) cls='sel';
      else if(e && ts===e) cls='sel';
      else if(s && e && ts>s && ts<e) cls='range';
    } else {
      if(state.date && date.toDateString()===state.date.toDateString()) cls='sel';
    }
    html+=`<button class="cal-day ${cls} ${dayCls}" ${past?'disabled':''} onclick="pickDate(${y},${m},${d})">${d}</button>`;
  }
  grid.innerHTML = html;
}
function moveMonth(n){ calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+n, 1); renderCalendar(); }
function pickDate(y,m,d){
  const picked = new Date(y,m,d);
  if(isTourCategory(state.category)){
    // 범위 선택: 출발일 먼저, 그다음 도착일
    if(!state.startDate || (state.startDate && state.endDate)){
      // 새로 시작
      state.startDate = picked; state.endDate = null;
    } else {
      // 도착일 선택
      if(picked < state.startDate){ state.endDate = state.startDate; state.startDate = picked; }
      else if(picked.getTime() === state.startDate.getTime()){ /* 같은 날 무시 */ }
      else { state.endDate = picked; }
    }
    renderStep();
  } else {
    state.date = picked;
    renderCalendar();
    const nb = document.getElementById('next-btn'); if(nb) nb.disabled=false;
  }
}
function pickPeople(p){ state.people = p; renderStep(); }
// 출발일·도착일 → "6/15(월) ~ 6/16(화) · 1박 2일" 형태
function tourRangeStr(){
  const days=['일','월','화','수','목','금','토'];
  const f = d => `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
  if(!state.startDate) return '출발일을 선택해 주세요.';
  if(!state.endDate) return `📅 ${f(state.startDate)} 출발 — 도착일을 선택해 주세요.`;
  const nights = Math.round((new Date(state.endDate).setHours(0,0,0,0) - new Date(state.startDate).setHours(0,0,0,0)) / 86400000);
  return `📅 ${f(state.startDate)} ~ ${f(state.endDate)} · ${nights}박 ${nights+1}일`;
}

  const sr = document.getElementById('search-result');

  const vu = document.getElementById('view-user');

  // 가입 전용 모드: 연락처 입력 → 이전(가입 취소)
  if(state.freeJoin || state.joinMode){
    if(cur==='contact'){ exitJoinMode(); return true; }
  }
  // 카테고리 선택 화면이면 더 뒤로 갈 곳 없음
  if(cur==='category') return false;
  // 완료 화면이면 동작 안 함(처음으로 버튼 사용 유도)
  if(cur==='done') return false;

  if(cur==='date' || cur==='inquiry'){ goCategory(); return true; }

  if(step>0){ prev(); return true; }
  return false;
}

// ===== 브라우저 뒤로가기 버튼 연동 =====
let __histReady = false;     // 첫 진입 시 기준 상태 1개 심기
let __suppressPush = false;  // popstate 처리 중에는 push 안 함
let __histDepth = 0;         // 앱 내부에서 쌓은 히스토리 깊이
function syncHistory(){
  try{
    if(__suppressPush) return;            // 뒤로가기로 인한 렌더면 push 생략
    if(!__histReady){
      // 페이지 최초: 기준 항목 하나 심기
      history.replaceState({ app:true, depth:0 }, '');
      __histReady = true;
      __histDepth = 0;
      return;
    }
    __histDepth += 1;
    history.pushState({ app:true, depth: __histDepth }, '');
  }catch(e){ /* 히스토리 사용 불가 시 무시 */ }
}
window.addEventListener('popstate', function(){
  // 브라우저 뒤로가기 → 앱의 이전 단계로
  // 손님 신청 화면이면 단계 뒤로, 아니면(운영자/비서/완료 등) 기본 동작
  __suppressPush = true;
  let moved = false;
  try{ moved = swipeBack(); }catch(e){ moved = false; }
  __suppressPush = false;

  if(moved){
    // 앱 내부에서 한 단계 뒤로 갔으니, 방금 소비된 히스토리 깊이 보정
    if(__histDepth > 0) __histDepth -= 1;
  } else {
    // 더 뒤로 갈 곳이 없으면(첫 화면 등) 다시 기준 상태를 심어
    // 사용자가 의도치 않게 사이트를 벗어나지 않도록 방지
    try{ history.pushState({ app:true, depth:0 }, ''); __histDepth = 0; }catch(e){}
  }
});

  requests.unshift({
    id: now,
    name: state.name, phone: state.phone,
    date: fmtDate(state.date), region: state.region,
    time: state.time, origin: state.origin, priority: state.priority,
    assigned: assigned,
    forwarded: forwarded,
    forwardedNew: forwarded,
    isNew: true,
    status: forwarded ? 'forwarded' : 'received',
    createdAt: now,
    forwardedAt: forwarded ? now : null,
    closedAt: null,
    note: '',
    member: isMember(state.phone),
